version: '3.9'
services:
  public-japan-travel-ai:
    build: .
    container_name: public-japan-travel-ai
    ports:
      - "8888:8000"
    env_file:
      - .env
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: public-japan-travel-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
