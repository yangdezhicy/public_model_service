services:
  public-japan-travel-ai:
    build: .
    container_name: public-japan-travel-ai
    ports:
      # Nginx 对外监听 15325；AI 服务只绑定宿主机本地 15326，避免抢占公网端口
      - "127.0.0.1:15326:8000"
    env_file:
      - .env
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: public-japan-travel-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
